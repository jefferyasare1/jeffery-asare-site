backend:
  name: github
  repo: jefferyasare1/jeffery-asare-site
  branch: main
  base_url: https://jeffery-asare-site.pages.dev
  auth_endpoint: api/auth

media_folder: "images"
public_folder: "images"

media_library:
  name: cloudinary
  config:
    cloud_name: dnayq60ze
    api_key: "176594188333811"

collections:
  - name: "portfolio"
    label: "Portfolio Photos"
    folder: "_data/portfolio"
    create: true
    slug: "{{fields.slug}}"
    identifier_field: "label"
    summary: "{{label}}"
    fields:
      - {label: "Series Name", name: "label", widget: "string", hint: "Display name, e.g. Random Stories"}
      - {label: "Series Slug", name: "slug", widget: "string", hint: "Lowercase with dashes, e.g. random-stories — must also be added in Site Settings → Portfolio Series"}
      - name: photos
        label: Photos
        widget: list
        label_singular: "Photo"
        summary: "{{fields.title}}"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Location", name: "loc", widget: "string"}
          - {label: "Date", name: "date", widget: "string", hint: "Format: 2026.06"}
          - {label: "Photo", name: "img", widget: "image"}
          - {label: "Description", name: "desc", widget: "text"}
          - {label: "Device", name: "device", widget: "string", default: "iPhone 15 Pro"}
          - {label: "Format", name: "format", widget: "string", default: "ProRAW", required: false}
          - {label: "Edited in", name: "edited_in", widget: "string", default: "Lightroom Mobile", required: false}

  - name: "prints"
    label: "Shop Prints"
    files:
      - label: "All Prints"
        name: "prints"
        file: "_data/prints.json"
        fields:
          - name: prints
            label: Prints
            widget: list
            label_singular: "Print"
            summary: "{{fields.title}} — {{fields.series}}"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Series Label", name: "series", widget: "string", hint: "e.g. PORTRAITS OF PLACE"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Paper", name: "paper", widget: "string", default: "Hahnemuhle Photo Rag 308gsm"}
              - {label: "Edition", name: "edition", widget: "string", default: "Edition of 20"}
              - {label: "Price (GHC)", name: "price", widget: "number"}
              - {label: "Edition Size (total prints)", name: "edition_size", widget: "number", required: false, hint: "e.g. 15 for 'Edition of 15'. Used to calculate remaining prints."}
              - {label: "Prints Sold", name: "prints_sold", widget: "number", default: 0, hint: "Update this each time a print sells. Remaining = edition size minus prints sold."}
              - {label: "Print Photo", name: "img", widget: "image"}
              - {label: "Sold Out", name: "soldOut", widget: "boolean", default: false, hint: "Tick this manually, or it will auto-trigger when prints_sold reaches edition_size."}
              - label: "Sizes"
                name: "sizes"
                widget: "list"
                default: ["A3 (29.7 x 42 cm)", "A2 (42 x 59.4 cm)"]

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Hero & General"
        name: "general"
        file: "_data/settings/general.json"
        fields:
          - {label: "Hero Headline Line 1", name: "hero_line1", widget: "string", default: "Photography"}
          - {label: "Hero Headline Line 2", name: "hero_line2", widget: "string", default: "is Poetry."}
          - {label: "Hero Description", name: "hero_desc", widget: "string"}
          - {label: "Hero Image 1", name: "hero1", widget: "image"}
          - {label: "Hero Image 2", name: "hero2", widget: "image"}
          - {label: "Hero Image 3", name: "hero3", widget: "image"}
          - {label: "Hero Image 4", name: "hero4", widget: "image"}
          - {label: "Hero Image 5", name: "hero5", widget: "image"}
          - {label: "About Portrait Photo", name: "about_photo", widget: "image"}
          - {label: "Contact Page Photo", name: "contact_photo", widget: "image"}

      - label: "Portfolio Page"
        name: "portfolio-page"
        file: "_data/settings/portfolio-page.json"
        fields:
          - {label: "Portfolio Description", name: "portfolio_desc", widget: "text"}

      - label: "About Page"
        name: "about-page"
        file: "_data/settings/about-page.json"
        fields:
          - {label: "Bio — Paragraph 1", name: "about_bio1", widget: "text"}
          - {label: "Bio — Paragraph 2", name: "about_bio2", widget: "text"}
          - {label: "Bio — Paragraph 3", name: "about_bio3", widget: "text"}
          - {label: "Bio — Paragraph 4", name: "about_bio4", widget: "text"}
          - {label: "Bio — Paragraph 5", name: "about_bio5", widget: "text"}
          - {label: "Photo Caption", name: "about_caption", widget: "string"}
          - {label: "Location Section Heading", name: "about_loc_heading", widget: "string"}
          - {label: "Location — Paragraph 1", name: "about_loc_p1", widget: "text"}
          - {label: "Location — Paragraph 2", name: "about_loc_p2", widget: "text"}
          - {label: "Location — Paragraph 3", name: "about_loc_p3", widget: "text"}
          - {label: "Philosophy Section Heading", name: "about_phil_heading", widget: "string"}
          - {label: "Philosophy — Paragraph 1", name: "about_phil_p1", widget: "text"}
          - {label: "Philosophy — Paragraph 2", name: "about_phil_p2", widget: "text"}
          - {label: "Philosophy — Paragraph 3", name: "about_phil_p3", widget: "text"}

      - label: "Shop Page"
        name: "shop-page"
        file: "_data/settings/shop-page.json"
        fields:
          - {label: "Shop Title", name: "shop_title", widget: "string"}
          - {label: "Shop Description", name: "shop_desc", widget: "text"}

      - label: "Portfolio Series"
        name: "series"
        file: "_data/settings/series.json"
        fields:
          - name: series
            label: Series
            widget: list
            label_singular: "Series"
            summary: "{{fields.label}} ({{fields.slug}})"
            fields:
              - {label: "Display Name", name: "label", widget: "string", hint: "What visitors see, e.g. Random Stories"}
              - {label: "Slug", name: "slug", widget: "string", hint: "Lowercase, dashes only, e.g. random-stories"}

      - label: "Contact Info"
        name: "contact-info"
        file: "_data/settings/contact-info.json"
        fields:
          - {label: "Sub Text", name: "contact_sub", widget: "text"}
          - {label: "Email Address", name: "contact_email", widget: "string"}
          - {label: "Instagram Handle", name: "contact_instagram_handle", widget: "string", hint: "e.g. @jeffasare"}
          - {label: "Instagram URL", name: "contact_instagram_url", widget: "string"}
          - {label: "Response Time", name: "contact_response", widget: "string", hint: "e.g. Typically within 24 hours"}
