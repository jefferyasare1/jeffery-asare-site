<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Jeffery Asare</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f2;color:#111;min-height:100vh;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-box{background:#fff;padding:2.5rem;border-radius:12px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
  .login-box h1{font-size:1.3rem;font-weight:600;margin-bottom:.4rem;}
  .login-box p{font-size:13px;color:#888;margin-bottom:1.8rem;}
  .login-box input{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:.7rem 1rem;font-size:14px;outline:none;margin-bottom:1rem;transition:border .2s;}
  .login-box input:focus{border-color:#111;}
  .login-box button{width:100%;background:#111;color:#fff;border:none;border-radius:8px;padding:.8rem;font-size:14px;cursor:pointer;}
  .login-box .err{color:#c00;font-size:12px;margin-top:.5rem;display:none;}
  #adminScreen{display:none;max-width:900px;margin:0 auto;padding:2.5rem 1.5rem 6rem;}
  .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
  .admin-header h1{font-size:1.4rem;font-weight:600;}
  .admin-header a{font-size:13px;color:#888;text-decoration:none;}
  .admin-header a:hover{color:#111;}
  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:2.5rem;}
  .stat-card{background:#fff;border-radius:10px;padding:1.2rem 1.4rem;}
  .stat-num{font-size:2rem;font-weight:700;letter-spacing:-.04em;color:#111;line-height:1;}
  .stat-label{font-size:11px;color:#999;margin-top:.3rem;letter-spacing:.06em;text-transform:uppercase;}
  /* Section header */
  .section-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#888;margin-bottom:1rem;margin-top:2.5rem;}
  /* Rate row */
  .rate-row{display:flex;align-items:center;gap:1rem;background:#fff;padding:1rem 1.2rem;border-radius:10px;margin-bottom:.5rem;}
  .rate-row label{font-size:13px;flex:1;}
  .rate-row input{width:120px;border:1.5px solid #ddd;border-radius:6px;padding:.45rem .7rem;font-size:14px;outline:none;}
  .rate-row input:focus{border-color:#111;}
  /* Portfolio grid */
  .portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;}
  .portfolio-card{background:#fff;border-radius:10px;overflow:hidden;display:flex;gap:.9rem;padding:1rem 1.2rem;align-items:center;}
  .port-thumb{width:48px;height:60px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#eee;}
  .port-thumb-ph{width:48px;height:60px;background:#eee;border-radius:4px;flex-shrink:0;}
  .port-info{}
  .port-title{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:.2rem;}
  .port-series{font-size:10px;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.2rem;}
  .port-loc{font-size:11px;color:#888;}
  /* Prints grid */
  .prints-grid{display:grid;gap:.75rem;}
  .print-row{background:#fff;border-radius:10px;padding:1rem 1.2rem;}
  .print-row-header{display:flex;align-items:center;gap:1rem;margin-bottom:.8rem;}
  .print-thumb{width:50px;height:62px;object-fit:cover;border-radius:4px;flex-shrink:0;}
  .print-thumb-ph{width:50px;height:62px;background:#eee;border-radius:4px;flex-shrink:0;}
  .print-info{min-width:0;flex:1;}
  .print-info .ptitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .print-info .pseries{font-size:11px;color:#888;margin-top:.15rem;}
  .print-info .pedition{font-size:11px;color:#bbb;margin-top:.1rem;}
  /* Size selector */
  .size-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem;}
  .size-tab{padding:.35rem .85rem;border-radius:999px;border:1.5px solid #ddd;background:none;font-size:12px;cursor:pointer;transition:all .15s;color:#666;}
  .size-tab.active{background:#111;color:#fff;border-color:#111;}
  .size-tab:hover:not(.active){border-color:#999;color:#111;}
  /* Price edit */
  .price-edit-row{display:flex;align-items:center;gap:.6rem;}
  .price-edit-row label{font-size:12px;color:#888;}
  .price-input-wrap{display:flex;align-items:center;gap:.4rem;}
  .price-input-wrap span{font-size:13px;color:#888;}
  .price-input-wrap input{width:110px;border:1.5px solid #ddd;border-radius:8px;padding:.55rem .8rem;font-size:18px;font-weight:600;text-align:right;outline:none;transition:border .2s;}
  .price-input-wrap input:focus{border-color:#111;}
  /* Save bar */
  .save-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid #eee;padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:2rem;}
  .save-bar .hint{font-size:12px;color:#888;}
  .save-bar button{background:#111;color:#fff;border:none;border-radius:8px;padding:.75rem 2rem;font-size:14px;cursor:pointer;transition:opacity .2s;}
  .save-bar button:hover{opacity:.8;}
  .save-bar .saved{color:green;font-size:13px;display:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Admin Panel</h1>
    <p>Jeffery Asare Photography</p>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Sign in</button>
    <div class="err" id="loginErr">Incorrect password.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <h1>Site Overview</h1>
    <a href="/">← Back to site</a>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- USD Rate -->
  <div class="section-title">USD Exchange Rate</div>
  <div class="rate-row">
    <label>GHS → USD rate &nbsp;<small style="color:#aaa">(1 GHS = ? USD — updates automatically on the site)</small></label>
    <input type="number" id="usdRate" step="0.001" min="0.001" placeholder="0.067">
  </div>

  <!-- Portfolio -->
  <div class="section-title">Portfolio — Active Photos</div>
  <div class="portfolio-grid" id="portfolioGrid"></div>

  <!-- Shop Prints -->
  <div class="section-title">Shop — Print Prices (GH₵)</div>
  <div class="prints-grid" id="printsGrid"></div>

  <div class="save-bar">
    <span class="hint">Price changes are stored locally. To update for all visitors, edit index.html and push to GitHub.</span>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="saved" id="savedMsg">✓ Saved</span>
      <button onclick="saveAll()">Save Price Changes</button>
    </div>
  </div>
</div>

<script>
var ADMIN_PASS = 'jeffery2026';

function login(){
  var pw = document.getElementById('pwInput').value;
  if(pw === ADMIN_PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    loadAdmin();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

// ── Active portfolio photos (mirrors index.html PHOTOS, active entries only) ──
var PORTFOLIO_DATA = [
  {id:'rs1', series:'RANDOM STORIES',   title:'Golden Hour at Labadi',  loc:'Labadi Beach, Accra',    date:'2026.04', img:'rs1.jpg'},
  {id:'rs2', series:'RANDOM STORIES',   title:'Between Stalls',          loc:'Kaneshie Market, Accra', date:'2025.08', img:'rs2.jpg'},
  {id:'pt1', series:'PORTRAITS',         title:'Stillness in Jamestown',  loc:'Jamestown, Accra',       date:'2025.11', img:'pt1.jpg'},
  {id:'ec1', series:'ECLIPSE',           title:'Eclipse I',               loc:'Studio, Accra',          date:'2025.06', img:'ec1.jpg'},
  {id:'ec2', series:'ECLIPSE',           title:'Eclipse II',              loc:'Studio, Accra',          date:'2025.07', img:'ec2.jpg'},
  {id:'ab1', series:'ABSTRACT',          title:'Market Weave',            loc:'Makola Market, Accra',   date:'2026.03', img:'ab1.jpg'},
  {id:'ab2', series:'ABSTRACT',          title:'Kente Geometry',          loc:'Kumasi, Ashanti',        date:'2025.09', img:'ab2.jpg'},
];

// ── Shop print data (mirrors index.html PRINTS, active entries only) ──
var PRINTS_DATA = [
  {id:'s1', title:'Stillness in Jamestown', series:'PORTRAITS OF PLACE', edition:'Edition of 15', img:'s1.jpg',
   sizes:[{label:'A3 (29.7 × 42 cm)',defaultPrice:920},{label:'A2 (42 × 59.4 cm)',defaultPrice:1200},{label:'A1 (59.4 × 84.1 cm)',defaultPrice:1650}]},
  {id:'s2', title:'Kente Geometry', series:'TEXTURE STUDIES', edition:'Edition of 30', img:'s2.jpg',
   sizes:[{label:'A4 (21 × 29.7 cm)',defaultPrice:480},{label:'A3 (29.7 × 42 cm)',defaultPrice:680},{label:'A2 (42 × 59.4 cm)',defaultPrice:920}]},
  {id:'s3', title:'Between Stalls', series:'ACCRA STREETS', edition:'Edition of 25', img:'s3.jpg',
   sizes:[{label:'A3 (29.7 × 42 cm)',defaultPrice:750},{label:'A2 (42 × 59.4 cm)',defaultPrice:1050}]},
  {id:'s4', title:'Eclipse I', series:'ECLIPSE OF THE SELF', edition:'Edition of 20', img:'s4.jpg',
   sizes:[{label:'A3 (29.7 × 42 cm)',defaultPrice:800},{label:'A2 (42 × 59.4 cm)',defaultPrice:1100},{label:'A1 (59.4 × 84.1 cm)',defaultPrice:1500}]},
  {id:'s5', title:'Golden Hour at Labadi', series:'RANDOM STORIES', edition:'Edition of 20', img:'s5.jpg',
   sizes:[{label:'A4 (21 × 29.7 cm)',defaultPrice:500},{label:'A3 (29.7 × 42 cm)',defaultPrice:700},{label:'A2 (42 × 59.4 cm)',defaultPrice:980}]},
  {id:'s6', title:'Market Weave', series:'ABSTRACT', edition:'Edition of 30', img:'s6.jpg',
   sizes:[{label:'A3 (29.7 × 42 cm)',defaultPrice:650},{label:'A2 (42 × 59.4 cm)',defaultPrice:900},{label:'A1 (59.4 × 84.1 cm)',defaultPrice:1300}]},
];

function loadAdmin(){
  var saved = JSON.parse(localStorage.getItem('ja_prices') || '{}');
  var savedRate = localStorage.getItem('ja_usd_rate') || '0.067';
  document.getElementById('usdRate').value = savedRate;

  // ── Stats ──
  var totalEditions = PRINTS_DATA.reduce(function(sum,p){
    var n = parseInt((p.edition||'').replace(/\D/g,'')) || 0;
    return sum + n;
  }, 0);
  var statsEl = document.getElementById('statsRow');
  statsEl.innerHTML =
    statCard(PORTFOLIO_DATA.length, 'Portfolio Photos') +
    statCard(PRINTS_DATA.length, 'Active Prints') +
    statCard(totalEditions, 'Total Editions') +
    statCard(PRINTS_DATA.reduce(function(s,p){return s+p.sizes.length;},0), 'Size Variants');

  // ── Portfolio section ──
  var portGrid = document.getElementById('portfolioGrid');
  portGrid.innerHTML = '';
  PORTFOLIO_DATA.forEach(function(ph){
    var card = document.createElement('div');
    card.className = 'portfolio-card';
    card.innerHTML =
      '<img class="port-thumb" src="'+ph.img+'" alt="'+ph.title+'" onerror="this.className=\'port-thumb-ph\'">' +
      '<div class="port-info">' +
        '<div class="port-series">'+ph.series+'</div>' +
        '<div class="port-title">'+ph.title+'</div>' +
        '<div class="port-loc">'+ph.loc+'</div>' +
      '</div>';
    portGrid.appendChild(card);
  });

  // ── Prints section ──
  var grid = document.getElementById('printsGrid');
  grid.innerHTML = '';

  PRINTS_DATA.forEach(function(p){
    var imgEl = '<img class="print-thumb" src="'+p.img+'" onerror="this.className=\'print-thumb-ph\'">';
    var sizeTabs = p.sizes.map(function(s,si){
      return '<button class="size-tab'+(si===0?' active':'')+'" data-pid="'+p.id+'" data-size="'+s.label+'">'
        + s.label.split('(')[0].trim()+'</button>';
    }).join('');
    var hiddenInputs = p.sizes.map(function(s){
      var key = s.label.replace(/[^a-zA-Z0-9]/g,'_');
      var savedPrice = (saved[p.id]&&saved[p.id][s.label]!==undefined) ? saved[p.id][s.label] : s.defaultPrice;
      return '<input type="number" id="price_'+p.id+'_'+key+'" value="'+savedPrice+'" min="0" step="10" data-pid="'+p.id+'" data-size="'+s.label+'" style="display:none;">';
    }).join('');
    var firstKey = p.sizes[0].label.replace(/[^a-zA-Z0-9]/g,'_');
    var firstPrice = (saved[p.id]&&saved[p.id][p.sizes[0].label]!==undefined) ? saved[p.id][p.sizes[0].label] : p.sizes[0].defaultPrice;

    var row = document.createElement('div');
    row.className = 'print-row';
    row.innerHTML = '<div class="print-row-header">'
      + imgEl
      + '<div class="print-info"><div class="ptitle">'+p.title+'</div><div class="pseries">'+p.series+'</div><div class="pedition">'+p.edition+'</div></div>'
      + '</div>'
      + '<div class="size-tabs">'+sizeTabs+'</div>'
      + '<div class="price-edit-row">'
      + '<label>GH&#8373;</label>'
      + '<div class="price-input-wrap">'
      + '<input type="number" id="priceVisible_'+p.id+'" value="'+firstPrice+'" min="0" step="10" style="font-size:22px;font-weight:700;">'
      + '</div>'
      + hiddenInputs
      + '</div>';

    row.querySelectorAll('.size-tab').forEach(function(tab){
      tab.addEventListener('click', function(){
        row.querySelectorAll('.size-tab').forEach(function(t){ t.classList.remove('active'); });
        tab.classList.add('active');
        var key = tab.dataset.size.replace(/[^a-zA-Z0-9]/g,'_');
        var hiddenInput = row.querySelector('#price_'+tab.dataset.pid+'_'+key);
        var visibleInput = row.querySelector('#priceVisible_'+tab.dataset.pid);
        if(hiddenInput && visibleInput){
          visibleInput.value = hiddenInput.value;
          visibleInput.oninput = function(){ hiddenInput.value = visibleInput.value; };
        }
      });
    });

    var firstVisible = row.querySelector('#priceVisible_'+p.id);
    var firstHidden  = row.querySelector('#price_'+p.id+'_'+firstKey);
    if(firstVisible && firstHidden){
      firstVisible.oninput = function(){ firstHidden.value = firstVisible.value; };
    }

    grid.appendChild(row);
  });
}

function statCard(num, label){
  return '<div class="stat-card"><div class="stat-num">'+num+'</div><div class="stat-label">'+label+'</div></div>';
}

function saveAll(){
  var prices = {};
  PRINTS_DATA.forEach(function(p){
    prices[p.id] = {};
    p.sizes.forEach(function(s){
      var key = s.label.replace(/[^a-zA-Z0-9]/g,'_');
      var el = document.getElementById('price_'+p.id+'_'+key);
      prices[p.id][s.label] = el ? (parseFloat(el.value)||s.defaultPrice) : s.defaultPrice;
    });
  });
  var rate = parseFloat(document.getElementById('usdRate').value) || 0.067;
  localStorage.setItem('ja_prices', JSON.stringify(prices));
  localStorage.setItem('ja_usd_rate', rate.toString());
  var msg = document.getElementById('savedMsg');
  msg.style.display = 'inline';
  setTimeout(function(){ msg.style.display='none'; }, 2500);
}
</script>
</body>
</html>
